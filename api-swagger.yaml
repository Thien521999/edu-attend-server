      tags:
        - users
      summary: Logout
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutBody'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
